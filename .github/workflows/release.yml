name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os-name: windows
            arch: x86_64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os-name: linux
            arch: x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            os-name: macos
            arch: x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            os-name: macos
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $zipName = "tungsten-$version-${{ matrix.os-name }}-${{ matrix.arch }}.zip"
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path tungsten.exe -DestinationPath "../../../$zipName"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          zip_name="tungsten-${version}-${{ matrix.os-name }}-${{ matrix.arch }}.zip"
          cd target/${{ matrix.target }}/release
          zip "../../../${zip_name}" tungsten

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tungsten-${{ matrix.os-name }}-${{ matrix.arch }}
          path: tungsten-*.zip

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Check if pre-release
        id: check_prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tungsten-*.zip
          generate_release_notes: true
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease == 'true' }}
