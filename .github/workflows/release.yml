name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tungsten.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tungsten

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tungsten

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tungsten

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp tungsten.exe ../../../tungsten-${{ matrix.target }}.exe
          else
            cp tungsten ../../../tungsten-${{ matrix.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tungsten-${{ matrix.target }}
          path: tungsten-${{ matrix.target }}*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tungsten-x86_64-pc-windows-msvc/tungsten-x86_64-pc-windows-msvc.exe
            tungsten-x86_64-unknown-linux-gnu/tungsten-x86_64-unknown-linux-gnu
            tungsten-x86_64-apple-darwin/tungsten-x86_64-apple-darwin
            tungsten-aarch64-apple-darwin/tungsten-aarch64-apple-darwin
          generate_release_notes: true
